source_model: "ncihtan/data-models@v25.2.1"
target_model: "ncihtan/htan2-data-model@v1.3.0"
domain: assay

# Tier 1 & 2: auto-derived from field-level and value-level SSSOM
field_mappings: "mappings/htan1_to_htan2/assay_fields.sssom.tsv"
value_mappings: "mappings/htan1_to_htan2/assay_values.sssom.tsv"
min_confidence: 0.9  # only auto-apply mappings above this threshold

passthroughs:
  - source: "HTAN Participant ID"
    target: "HTAN_PARTICIPANT_ID"
  - source: "HTAN Biospecimen ID"
    target: "HTAN_BIOSPECIMEN_ID"
  - source: "HTAN Data File ID"
    target: "HTAN_DATA_FILE_ID"

# Tier 3: explicit conversion rules
conversions: []

# Tier 4: structural transforms
structural: []

# Tier 5: defaults for required fields with no source
defaults: []
